<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Xush kelibsiz!</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="app-body">
  <div class="bg-shapes">
    <div class="shape s1"></div>
    <div class="shape s2"></div>
    <div class="shape s3"></div>
  </div>

  <div class="app-container">
    <div class="welcome-card">
      <div class="avatar" id="avatarCircle"></div>
      <div class="welcome-label">Muvaffaqiyatli kirdingiz</div>
      <h1 class="welcome-title">Xush kelibsiz,<br/><span id="welcomeName" class="highlight-name"></span>!</h1>
      <p class="welcome-sub">Hisobingizga muvaffaqiyatli kirdingiz. Ilovadan bahramand bo'ling.</p>

      <!-- Text to Speech -->
      <div class="feature-block">
        <div class="feature-title">🎙 Matnni Nutqqa Aylantirish</div>
        <textarea id="ttsText" placeholder="Matn yozing..."></textarea>
        <button class="btn btn-primary" onclick="speak()">
          <span>Gapirtir</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
      </div>

      <!-- Slider -->
      <div class="feature-block">
        <div class="feature-title">🖼 Slayder</div>
        <div class="slider-wrap">
          <div class="slides" id="slides">
            <div class="slide" style="background:#4facfe;">Slayd 1</div>
            <div class="slide" style="background:#f093fb;">Slayd 2</div>
            <div class="slide" style="background:#43e97b;">Slayd 3</div>
          </div>
          <div class="slider-controls">
            <button class="slide-btn" onclick="prevSlide()">‹</button>
            <span id="slideIndex">1 / 3</span>
            <button class="slide-btn" onclick="nextSlide()">›</button>
          </div>
        </div>
      </div>

      <button class="btn btn-logout" onclick="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Chiqish</span>
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
